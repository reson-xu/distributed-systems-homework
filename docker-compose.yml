services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/seckill?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: seckill
      SPRING_DATASOURCE_PASSWORD: seckill123
      ROCKETMQ_NAME_SERVER: rmqnamesrv:9876
      SECURITY_JWT_SECRET: ReplaceWithAtLeast32CharsJwtSecretKey123456
      SECURITY_JWT_EXPIRATION: 7200
    depends_on:
      db:
        condition: service_healthy
      rmqnamesrv:
        condition: service_started
      rmqbroker:
        condition: service_started
    networks:
      - seckill-network

  db:
    image: mysql:8.4
    container_name: seckill-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill
      MYSQL_USER: seckill
      MYSQL_PASSWORD: seckill123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./resources/database/init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - seckill-network

  rmqnamesrv:
    image: apache/rocketmq:5.3.2
    container_name: seckill-rmqnamesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - seckill-network

  rmqbroker:
    image: apache/rocketmq:5.3.2
    container_name: seckill-rmqbroker
    restart: unless-stopped
    command: sh mqbroker -n rmqnamesrv:9876 -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - rmqnamesrv
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./deploy/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf:ro
    networks:
      - seckill-network

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - seckill-network

volumes:
  mysql-data:

networks:
  seckill-network:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/seckill?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: seckill
      SPRING_DATASOURCE_PASSWORD: seckill123
      SECURITY_JWT_SECRET: ReplaceWithAtLeast32CharsJwtSecretKey123456
      SECURITY_JWT_EXPIRATION: 7200
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seckill-network

  db:
    image: mariadb:11.4
    container_name: seckill-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: seckill
      MARIADB_USER: seckill
      MARIADB_PASSWORD: seckill123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./resources/database/init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - seckill-network

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - seckill-network

volumes:
  mariadb-data:

networks:
  seckill-network:
    driver: bridge
